{% set name = "kanban-python" %}
{% set version = "0.6.1" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/{{ name.replace('-', '_') }}-{{ version }}.tar.gz
  sha256: 28907c55c16e6ac7fbd48c58abd4beaa2b5d97c0085b0e2a9f17addcd781325d

build:
  noarch: python
  entry_points:
    - kanban = kanban_python.app:run
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0

requirements:
  host:
    - python {{ python_min }}
    - hatchling
    - pip
  run:
    - python >={{ python_min }}
    - platformdirs >=4.3.6
    - rich >=13.9.4

test:
  imports:
    - kanban_python
  commands:
    - pip check
    - kanban --help
  requires:
    - pip
    - python {{ python_min }}

about:
  home: https://github.com/Zaloog/kanban-python
  summary: Terminal Kanban App written in Python
  license: MIT
  license_file: LICENSE.txt

extra:
  recipe-maintainers:
    - thewchan
